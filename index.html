<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كتالوج المنتجات — مجد الدبوس للتجارة العامة</title>
<meta name="description" content="كتالوج منتجات مجد الدبوس للتجارة العامة — مواد منزلية بجودة عالية، بغداد">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#C9A96E; --gold-l:#E8D5A3; --gold-d:#9A7A4A;
  --dark:#0A0A0A; --dark2:#111111; --dark3:#1A1A1A; --dark4:#222222;
  --card:#131313; --text:#F0EAD6; --muted:#6A6050;
  --green:#4DC87A; --red:#E05252; --blue:#5B9BD5;
  --r:14px; --border:rgba(201,169,110,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Cairo',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}

/* ===== HERO ===== */
.hero {
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(201,169,110,.12) 0%, transparent 70%),
    linear-gradient(180deg,#0F0C04 0%,var(--dark) 100%);
  padding:3.5rem 1.5rem 2.5rem;
  text-align:center;
  border-bottom:1px solid rgba(201,169,110,.08);
  position:relative;
  overflow:hidden;
}
.hero::before {
  content:'';
  position:absolute; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(201,169,110,.02) 40px),
             repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(201,169,110,.02) 40px);
  pointer-events:none;
}
.hero-ico { font-size:52px; margin-bottom:1rem; animation:fadeDown .6s ease; }
.hero h1 { font-size:clamp(20px,5vw,30px); font-weight:900; color:var(--gold); margin-bottom:.4rem; animation:fadeDown .6s .1s ease both; }
.hero p   { font-size:clamp(12px,3vw,14px); color:var(--muted); font-family:'Tajawal',sans-serif; animation:fadeDown .6s .2s ease both; }
.hero-divider { width:60px; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:1.2rem auto 0; animation:fadeDown .6s .3s ease both; }

@keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:none} }

/* ===== STICKY FILTER BAR ===== */
.filter-bar {
  position:sticky; top:0; z-index:50;
  background:rgba(10,10,10,.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,.04);
  padding:10px 1.5rem;
  display:flex; gap:10px; align-items:center; flex-wrap:wrap;
}
.srch {
  flex:1; min-width:180px;
  background:var(--dark3); border:1px solid #252525; border-radius:10px;
  padding:9px 14px; color:var(--text); font-family:'Cairo',sans-serif; font-size:13px;
}
.srch:focus { outline:none; border-color:var(--gold); }
.cats-scroll { display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; }
.cats-scroll::-webkit-scrollbar { height:0; }
.fbtn { padding:6px 14px; border-radius:20px; border:1px solid #252525; background:transparent; color:var(--muted); font-family:'Cairo',sans-serif; font-size:12px; cursor:pointer; transition:all .2s; white-space:nowrap; flex-shrink:0; }
.fbtn.on { background:var(--gold); color:#0A0A0A; border-color:var(--gold); font-weight:800; }
.fbtn:hover:not(.on) { border-color:rgba(201,169,110,.3); color:var(--gold-l); }

/* ===== RESULTS INFO ===== */
.results-info { padding:.6rem 1.5rem 0; font-size:12px; color:var(--muted); font-family:'Tajawal',sans-serif; }

/* ===== GRID ===== */
.catalog-wrap { padding:1rem 1.5rem 5rem; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }

/* ===== PRODUCT CARD ===== */
.pcard {
  background:var(--card); border:1px solid #1E1E1E;
  border-radius:var(--r); overflow:hidden;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s, border-color .25s;
  cursor:default;
  animation:cardIn .35s ease both;
}
@keyframes cardIn { from{opacity:0;transform:translateY(16px)scale(.97)} to{opacity:1;transform:none} }
.pcard:hover { transform:translateY(-5px); box-shadow:0 16px 48px rgba(201,169,110,.12); border-color:rgba(201,169,110,.22); }

/* Image area */
.img-wrap { position:relative; aspect-ratio:1; overflow:hidden; background:var(--dark3); }
.img-wrap img { width:100%; height:100%; object-fit:cover; transition:transform .5s cubic-bezier(.34,1.56,.64,1); cursor:pointer; }
.pcard:hover .img-wrap img { transform:scale(1.06); }
.no-img { display:flex; align-items:center; justify-content:center; height:100%; font-size:52px; color:#1E1E1E; }
.multi-badge { position:absolute; bottom:8px; left:8px; background:rgba(0,0,0,.75); color:var(--gold-l); font-size:10px; padding:3px 8px; border-radius:20px; backdrop-filter:blur(4px); }
.avail-badge { position:absolute; top:10px; right:10px; padding:4px 10px; border-radius:20px; font-size:10px; font-weight:700; backdrop-filter:blur(4px); }
.avail-badge.yes { background:rgba(10,30,18,.85); color:var(--green); border:1px solid rgba(77,200,122,.2); }
.avail-badge.no  { background:rgba(30,10,10,.85); color:var(--red);   border:1px solid rgba(224,82,82,.2); }

/* Card body */
.cbody { padding:14px; }
.ccat { font-size:9px; color:var(--gold); font-weight:700; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:4px; font-family:'Tajawal',sans-serif; }
.cname { font-size:14px; font-weight:800; margin-bottom:5px; line-height:1.35; }
.cdesc { font-size:11px; color:var(--muted); line-height:1.6; margin-bottom:10px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; font-family:'Tajawal',sans-serif; }
.meta { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:12px; }
.chip { font-size:10px; padding:3px 9px; border-radius:6px; font-family:'Tajawal',sans-serif; display:flex; align-items:center; gap:4px; }
.chip-pkg  { background:rgba(91,155,213,.1);  color:var(--blue); }
.chip-moq  { background:rgba(201,169,110,.1); color:var(--gold); }
.cprice { font-size:17px; font-weight:900; color:var(--gold); font-family:'Tajawal',sans-serif; }
.cprice.hidden { font-size:12px; color:var(--muted); font-weight:600; }
.cfoot { margin-top:12px; padding-top:10px; border-top:1px solid #1A1A1A; display:flex; gap:8px; }
.wa-mini {
  flex:1; text-align:center; text-decoration:none;
  background:rgba(37,211,102,.1); border:1px solid rgba(37,211,102,.2);
  color:#4DC87A; border-radius:8px; padding:7px; font-size:11px; font-weight:700;
  transition:background .2s;
}
.wa-mini:hover { background:rgba(37,211,102,.18); }

/* ===== EMPTY ===== */
.empty-state { text-align:center; padding:5rem 2rem; grid-column:1/-1; }
.empty-state .ico { font-size:56px; margin-bottom:1rem; opacity:.4; }
.empty-state h3 { font-size:15px; color:var(--muted); margin-bottom:6px; }
.empty-state p  { font-size:12px; color:#333; font-family:'Tajawal',sans-serif; line-height:1.7; }

/* ===== FOOTER ===== */
.footer {
  background:var(--dark2); border-top:1px solid #1A1A1A;
  padding:2rem 1.5rem; text-align:center;
  font-size:12px; color:var(--muted); font-family:'Tajawal',sans-serif;
}
.footer strong { color:var(--gold-l); }

/* ===== WHATSAPP FAB ===== */
.wa-fab {
  display:none; position:fixed; bottom:24px; left:24px;
  background:linear-gradient(135deg,#25D366,#20BA5A);
  color:white; padding:13px 22px; border-radius:50px;
  font-family:'Cairo',sans-serif; font-weight:700; font-size:13px;
  text-decoration:none; box-shadow:0 6px 24px rgba(37,211,102,.4);
  transition:transform .2s, box-shadow .2s; z-index:40;
  align-items:center; gap:8px;
}
.wa-fab:hover { transform:translateY(-3px); box-shadow:0 10px 32px rgba(37,211,102,.5); }

/* ===== LIGHTBOX ===== */
.lb { display:none; position:fixed; inset:0; background:rgba(0,0,0,.97); z-index:300; align-items:center; justify-content:center; flex-direction:column; gap:14px; }
.lb.open { display:flex; }
.lb-img { max-width:90vw; max-height:72vh; object-fit:contain; border-radius:12px; }
.lb-nav { display:flex; gap:10px; align-items:center; }
.lb-btn { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); color:var(--text); width:40px; height:40px; border-radius:10px; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.lb-btn:hover { border-color:var(--gold); color:var(--gold); }
.lb-x { position:absolute; top:18px; left:18px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); color:white; width:36px; height:36px; border-radius:10px; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center; }
.lb-info { font-size:13px; color:var(--gold-l); font-family:'Tajawal',sans-serif; }
.lb-dots { display:flex; gap:6px; }
.dot { width:7px; height:7px; border-radius:50%; background:#333; cursor:pointer; transition:background .2s; }
.dot.on { background:var(--gold); }

/* ===== NO DATA SCREEN ===== */
#no-data { display:none; text-align:center; padding:6rem 2rem; }
#no-data .ico { font-size:64px; margin-bottom:1.5rem; opacity:.3; }
#no-data h2 { font-size:18px; color:var(--muted); margin-bottom:.5rem; }
#no-data p  { font-size:13px; color:#333; font-family:'Tajawal',sans-serif; line-height:1.8; }

@media(max-width:600px) {
  .grid { grid-template-columns:repeat(2,1fr); gap:10px; }
  .catalog-wrap { padding:.8rem 1rem 5rem; }
  .filter-bar { padding:8px 1rem; }
  .hero { padding:2.5rem 1rem 1.8rem; }
}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-ico" id="hero-ico">🏠</div>
  <h1 id="hero-company">كتالوج مجد الدبوس للتجارة العامة</h1>
  <p id="hero-tagline">مواد منزلية بجودة عالية · بغداد، العراق</p>
  <div class="hero-divider"></div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <input class="srch" id="srch" type="text" placeholder="🔍 ابحث عن منتج..." oninput="render()">
  <div class="cats-scroll" id="cats-scroll"></div>
</div>

<!-- RESULTS INFO -->
<div class="results-info" id="results-info"></div>

<!-- CATALOG -->
<div class="catalog-wrap" id="catalog-wrap">
  <div class="grid" id="grid">
    <div class="empty-state">
      <div class="ico">⏳</div>
      <h3>جاري تحميل الكتالوج...</h3>
    </div>
  </div>
</div>

<!-- NO DATA -->
<div id="no-data">
  <div class="ico">📦</div>
  <h2>الكتالوج فارغ حالياً</h2>
  <p>يتم العمل على إضافة المنتجات<br>تواصل معنا مباشرة للاستفسار</p>
</div>

<!-- FOOTER -->
<footer class="footer" id="footer">
  <strong id="footer-company">مجد الدبوس للتجارة العامة</strong><br>
  <span id="footer-city">بغداد، العراق</span> · جميع الحقوق محفوظة
</footer>

<!-- WA FAB -->
<a href="#" target="_blank" class="wa-fab" id="wa-fab">
  📲 تواصل معنا
</a>

<!-- LIGHTBOX -->
<div class="lb" id="lb">
  <button class="lb-x" onclick="closeLb()">✕</button>
  <img class="lb-img" id="lb-img" src="" alt="">
  <div class="lb-info" id="lb-info"></div>
  <div class="lb-nav">
    <button class="lb-btn" onclick="lbMv(-1)">→</button>
    <div class="lb-dots" id="lb-dots"></div>
    <button class="lb-btn" onclick="lbMv(1)">←</button>
  </div>
</div>

<script>
// ===== LOAD SHARED DATA =====
// Catalog reads from the same localStorage key that admin.html writes to
const STORE_KEY = 'majd_v2';

function getStore() {
  const raw = localStorage.getItem(STORE_KEY);
  if (!raw) return null;
  return JSON.parse(raw);
}

let store = null;
let activeCat = 'all';
let lbImgs = [], lbIdx = 0, lbName = '';

// ===== INIT =====
window.addEventListener('load', () => {
  store = getStore();
  if (!store || !store.products?.length) {
    document.getElementById('no-data').style.display = 'block';
    document.getElementById('catalog-wrap').style.display = 'none';
    document.getElementById('filter-bar')?.remove();
    return;
  }
  applyBranding();
  render();
});

// ===== BRANDING =====
function applyBranding() {
  const s = store.settings || {};
  const company = s.company || 'مجد الدبوس للتجارة العامة';
  const city    = s.city    || 'بغداد، العراق';
  const tagline = s.tagline || 'مواد منزلية بجودة عالية';
  const waNum   = s.waNum   || '9647732395684';

  document.title = `كتالوج — ${company}`;
  document.getElementById('hero-company').textContent = `كتالوج ${company}`;
  document.getElementById('hero-tagline').textContent = `${tagline} · ${city}`;
  document.getElementById('footer-company').textContent = company;
  document.getElementById('footer-city').textContent = city;

  // WhatsApp
  const fab = document.getElementById('wa-fab');
  if (s.wa !== false) {
    fab.href = `https://wa.me/${waNum}`;
    fab.style.display = 'flex';
  }
}

// ===== CATEGORIES =====
function getCats() { return [...new Set(store.products.filter(p => p.available === 'yes' || store.settings?.unavail).map(p => p.category).filter(Boolean))]; }

function renderCats() {
  const cats = getCats();
  const el = document.getElementById('cats-scroll');
  el.innerHTML = ['all', ...cats].map(c =>
    `<button class="fbtn ${activeCat===c?'on':''}" onclick="setCat('${c}')">${c==='all'?'🗂️ الكل':c}</button>`
  ).join('');
}

function setCat(c) { activeCat = c; render(); }

// ===== RENDER =====
function render() {
  const s    = store.settings || {};
  const q    = (document.getElementById('srch')?.value || '').toLowerCase();
  const showUnavail = !!s.unavail;

  let list = store.products.filter(p => {
    if (!showUnavail && p.available === 'no') return false;
    if (activeCat !== 'all' && p.category !== activeCat) return false;
    if (q && !p.name.toLowerCase().includes(q) && !(p.sku||'').toLowerCase().includes(q) && !(p.desc||'').toLowerCase().includes(q)) return false;
    return true;
  });

  renderCats();

  const info = document.getElementById('results-info');
  info.textContent = list.length ? `${list.length} منتج` : '';

  const grid = document.getElementById('grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state"><div class="ico">🔍</div><h3>لا توجد نتائج</h3><p>جرب كلمة بحث مختلفة</p></div>`;
    return;
  }

  grid.innerHTML = list.map((p, i) => buildCard(p, s, i)).join('');
}

// ===== BUILD CARD =====
function buildCard(p, s, idx) {
  const img = p.images?.[0];
  const imgHtml = img
    ? `<img src="${img}" alt="${p.name}" onclick="openLb(${p.id})" loading="${idx < 4 ? 'eager' : 'lazy'}" onerror="this.style.display='none';this.nextElementSibling?.remove();this.parentElement.innerHTML+='<div class=\\'no-img\\'>🏠</div>'">`
    : `<div class="no-img">🏠</div>`;
  const multiHtml = p.images?.length > 1 ? `<span class="multi-badge">📸 ${p.images.length}</span>` : '';

  let chips = '';
  if (s.pkg && p.pkg) chips += `<span class="chip chip-pkg">📦 ${p.pkg}${p.perbox?' · '+p.perbox+' قطعة':''}</span>`;
  if (s.moq && p.moq) chips += `<span class="chip chip-moq">🔢 الحد الأدنى: ${p.moq}</span>`;

  const waNum = s.waNum || '9647732395684';
  const waMsg = encodeURIComponent(`مرحباً، أريد الاستفسار عن: ${p.name} (${p.sku})`);
  const waLink = `https://wa.me/${waNum}?text=${waMsg}`;

  const priceHtml = s.price !== false
    ? `<div class="cprice">${p.price ? Number(p.price).toLocaleString('ar-IQ') + ' <span style="font-size:12px;font-weight:500">د.ع</span>' : 'السعر عند الطلب'}</div>`
    : `<div class="cprice hidden">📞 للسعر تواصل معنا</div>`;

  return `
  <div class="pcard" style="animation-delay:${idx*0.04}s">
    <div class="img-wrap">
      ${imgHtml}${multiHtml}
      <span class="avail-badge ${p.available}">${p.available==='yes'?'✅ متوفر':'❌ غير متوفر'}</span>
    </div>
    <div class="cbody">
      <div class="ccat">${p.category}</div>
      <div class="cname">${p.name}</div>
      ${p.desc ? `<div class="cdesc">${p.desc}</div>` : ''}
      ${chips ? `<div class="meta">${chips}</div>` : ''}
      ${priceHtml}
      <div class="cfoot">
        <a href="${waLink}" target="_blank" class="wa-mini">📲 اطلب الآن</a>
      </div>
    </div>
  </div>`;
}

// ===== LIGHTBOX =====
function openLb(id) {
  const p = store.products.find(x => x.id === id);
  if (!p?.images?.length) return;
  lbImgs = p.images; lbIdx = 0; lbName = p.name;
  updLb();
  document.getElementById('lb').classList.add('open');
}
function updLb() {
  document.getElementById('lb-img').src  = lbImgs[lbIdx];
  document.getElementById('lb-info').textContent = `${lbName} · ${lbIdx+1} / ${lbImgs.length}`;
  document.getElementById('lb-dots').innerHTML = lbImgs.map((_,i) =>
    `<div class="dot ${i===lbIdx?'on':''}" onclick="lbGo(${i})"></div>`
  ).join('');
  document.getElementById('lb-nav').style.display = lbImgs.length > 1 ? 'flex' : 'none';
}
function lbMv(d) { lbIdx = (lbIdx+d+lbImgs.length)%lbImgs.length; updLb(); }
function lbGo(i) { lbIdx = i; updLb(); }
function closeLb() { document.getElementById('lb').classList.remove('open'); }
document.getElementById('lb').addEventListener('click', e => { if(e.target===e.currentTarget) closeLb(); });

// Keyboard
document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('open')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowUp')   lbMv(-1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowDown')  lbMv(1);
  if (e.key === 'Escape') closeLb();
});
</script>
</body>
</html>
